# Static trigger fixtures for TigerKit 18.

- skill: tk-grill-me
  positive:
    - "이 설계를 질문으로 압박 검증해줘"
    - "이 RFC에서 내가 결정해야 할 걸 하나씩 물어봐"
    - "이 계획의 중요한 미결정을 grill 해줘"
  negative:
    - "이 설계를 구현해줘"
    - "결정 내용을 spec 파일로 써줘"
- skill: tk-grill-with-docs
  positive:
    - "도메인 용어를 정리하면서 설계를 질문해줘"
    - "결정을 수렴하고 필요한 ADR만 남겨줘"
    - "glossary와 함께 이 RFC를 grill 해줘"
  negative:
    - "바로 기능을 구현해줘"
    - "모든 선택을 ADR로 만들어줘"
- skill: tk-grilling
  positive:
    - "이 설계에서 사용자 결정이 필요한 걸 짚어야 한다"
    - "계획 합의 전 한 질문만 해야 한다"
    - "코드에서 찾을 사실과 사용자 결정을 구분해야 한다"
  negative:
    - "이미 합의된 구현을 진행한다"
    - "코드 검색으로 답할 수 있는 사실을 사용자에게 묻는다"
- skill: tk-domain-modeling
  positive:
    - "Cancellation과 Refund 경계를 정리해줘"
    - "도메인 용어가 코드와 설명에서 다른지 봐줘"
    - "되돌리기 어려운 선택인지 ADR 조건을 검토해줘"
  negative:
    - "함수 이름만 바꿔줘"
    - "구현 세부사항을 glossary에 기록해줘"
- skill: tk-to-spec
  positive:
    - "이 대화를 구현 spec으로 정리해줘"
    - "이 문서를 .tigerkit/spec.md로 합성해줘"
    - "현재 결정으로 print-only spec을 만들어줘"
  negative:
    - "이 spec을 ticket으로 쪼개줘"
    - "spec을 보고 바로 구현해줘"
- skill: tk-to-tickets
  positive:
    - "이 spec을 vertical ticket으로 나눠줘"
    - "현재 요청을 독립 검증 가능한 ticket으로 정리해줘"
    - "이 계획을 .tigerkit/tickets.md로 만들어줘"
  negative:
    - "ticket을 바로 구현해줘"
    - "GitHub issue로 자동 publish해줘"
- skill: tk-tdd
  positive:
    - "이 변경은 red-green-refactor가 유효하다"
    - "공개 seam에서 실패 테스트부터 작성해야 한다"
    - "한 vertical slice를 test-first로 구현한다"
  negative:
    - "테스트 seam이 없는 throwaway 탐색이다"
    - "이미 동작하는 문서 오탈자만 고친다"
- skill: tk-diagnosing-bugs
  positive:
    - "이 간헐 버그를 재현하고 원인을 찾아줘"
    - "실패를 최소화하고 가설을 검증해줘"
    - "원래 재현 절차로 regression을 확인해줘"
  negative:
    - "원인 확인 없이 바로 패치해줘"
    - "새 기능을 설계해줘"
- skill: tk-code-review
  positive:
    - "main 기준 diff를 리뷰해줘"
    - "이 고정 diff가 spec을 충족하는지 검토해줘"
    - "변경 범위의 code quality finding을 찾아줘"
  negative:
    - "finding을 직접 수정해줘"
    - "전체 repo를 무제한 재검토해줘"
- skill: tk-implement
  positive:
    - "이 버그를 수정하고 검증해줘"
    - "이 ticket을 구현해줘"
    - "prompt만 보고 이 작은 변경을 완료해줘"
  negative:
    - "아이디어를 질문으로 검토해줘"
    - "현재 경험에서 rule 후보를 추출해줘"
- skill: tk-prototype
  positive:
    - "이 모달 flow를 throwaway prototype으로 비교해줘"
    - "이 상태 전이를 작은 harness로 검증해줘"
    - "Figma 기반으로 UI variant 세 개를 만들어 비교해줘"
  negative:
    - "production 코드로 완성해줘"
    - "prototype을 자동 commit해줘"
- skill: tk-browser-verify
  positive:
    - "이 모달이 실제로 저장되는지 브라우저에서 확인해줘"
    - "QA와 로컬 화면 차이를 확인해줘"
    - "Figma와 현재 구현이 맞는지 검증해줘"
  negative:
    - "저장 모달 코드를 구현해줘"
    - "모달 설계 아이디어를 세 개 만들어줘"
- skill: tk-reflect
  positive:
    - "이번 작업에서 repo rule 후보를 뽑아줘"
    - "사용자 correction을 skill 후보로 reflect 해줘"
    - "이 diff와 테스트 결과에서 재사용 교훈을 분류해줘"
  negative:
    - "후보를 바로 파일에 적용해줘"
    - "spec을 publish해줘"
- skill: tk-learn
  positive:
    - "이 workflow를 reusable skill draft로 만들어줘"
    - "이 reflect 후보를 repo skill로 작성해줘"
    - "이 URL 자료로 user skill을 만들어줘"
  negative:
    - "짧은 standing rule을 만들어줘"
    - "기존 skill과 같은 것을 하나 더 만들어줘"
- skill: tk-grooming
  positive:
    - "repo와 user skill 중복을 report-only로 점검해줘"
    - "깨진 skill reference를 찾아줘"
    - "명시적으로 이 grooming 제안을 적용해줘"
  negative:
    - "새 지식을 추출해 rule을 만들어줘"
    - "legacy 상태를 자동 migration해줘"
- skill: tk-handoff
  positive:
    - "현재 작업 handoff를 저장해줘"
    - "이어서 작업할 수 있게 상태를 남겨줘"
    - "resume하고 실제 git 상태 차이를 확인해줘"
  negative:
    - "대화 전문을 복사해줘"
    - "handoff 후 자동 commit해줘"
- skill: tk-merge-conflict
  positive:
    - "현재 rebase conflict를 intent 기준으로 해결해줘"
    - "merge hunk 양쪽 의도를 보존해줘"
    - "충돌 해결 후 관련 검증을 실행해줘"
  negative:
    - "active conflict 없이 파일을 정리해줘"
    - "force push로 충돌을 없애줘"
- skill: tk-codebase-design
  positive:
    - "반복되는 ownership 혼선을 구조적으로 검토해줘"
    - "이 변경마다 파일이 같이 흔들리는 원인을 봐줘"
    - "test seam 부재에 가장 작은 구조 개선을 제안해줘"
  negative:
    - "전면 재작성을 설계해줘"
    - "구조 개선을 자동 구현해줘"
