# Static contract fixtures.
# These files do not execute models or measure invocation accuracy.
# Hybrid positive/negative cases cover automatic invocation; explicit invocation is a behavior contract.

- skill: tk-grill-me
  examples:
    - "tk-grill-me로 이 설계를 질문으로 검토해줘"
    - "이 RFC를 한 번에 한 질문씩 압박 검증해줘"
  nearby:
    - tk-to-spec
    - tk-prototype
- skill: tk-to-spec
  positive:
    - "확정된 결정으로 구현 명세를 작성해줘"
    - "이 대화를 .tigerkit/spec.md로 정리해줘"
    - "이 버그 evidence를 R/AC가 있는 spec으로 만들어줘"
  negative:
    - "이 명세를 수직 티켓으로 나눠줘"
    - "GitHub issue를 만들어줘"
    - "active tk-drive가 spec phase를 진행 중이야"
- skill: tk-to-tickets
  positive:
    - "이 Ready spec을 독립 검증 가능한 수직 티켓으로 나눠줘"
    - "R/AC coverage가 있는 tickets.md를 작성해줘"
    - "이 버그 수정을 하나의 vertical ticket으로 만들어줘"
  negative:
    - "이 결정으로 구현 명세를 작성해줘"
    - "이슈를 원격 tracker에 등록해줘"
    - "active tk-drive가 ticket 여부를 판단 중이야"
- skill: tk-implement
  examples:
    - "tk-implement로 이 ticket을 구현해줘"
    - "direct, no-tdd로 이 변경을 완료해줘"
  nearby:
    - tk-prototype
    - tk-to-spec
- skill: tk-prototype
  positive:
    - "같은 데이터로 A/B/C UI prototype을 실제 실행해줘"
    - "버릴 수 있는 html css js로 레이아웃 두 안을 비교해줘"
    - "이 상태 전이를 throwaway harness로 검증해줘"
  negative:
    - "프로덕션 모달을 구현해줘"
    - "화면 아이디어만 브레인스토밍해줘"
    - "repository evidence로 선택된 안을 그대로 적용해줘"
- skill: tk-reflect
  positive:
    - "이번 diff의 증거에서 재사용 rule/skill 후보를 보고해줘"
    - "이 반복 실패를 repo rule 후보로 회고해줘"
    - "이 correction에서 재사용 가능한 교훈을 네 축으로 분류해줘"
  negative:
    - "방금 변경을 짧게 요약해줘"
    - "후보를 바로 규칙 파일에 적용해줘"
    - "active tk-drive가 구현 중이야"
- skill: tk-learn
  positive:
    - "이 workflow를 reusable repo skill로 설계해줘"
    - "이 reflect 후보로 user skill 초안을 만들어줘"
    - "trigger와 boundary eval이 있는 skill을 제안해줘"
  negative:
    - "이 팁을 현재 파일에 한 번 적용해줘"
    - "재사용 후보만 report-only로 알려줘"
    - "active tk-drive가 다음 phase를 진행 중이야"
- skill: tk-grooming
  positive:
    - "repo와 user skill 중복·배치를 감사해줘"
    - "깨진 skill reference를 report-only로 찾아줘"
    - "기존 rule을 keep/move/convert 중 무엇인지 제안해줘"
  negative:
    - "코드 포맷을 정리해줘"
    - "이번 diff에서 재사용 후보를 찾아줘"
    - "active tk-drive가 tickets를 구현 중이야"
- skill: tk-handoff
  positive:
    - "현재 evidence로 handoff 문서를 작성해줘"
    - "다음 session에서 이어갈 수 있게 인수인계를 남겨줘"
    - "기존 handoff를 drift 확인 후 resume해줘"
  negative:
    - "현재 상태를 요약해줘"
    - "그대로 계속 진행해"
    - "active tk-drive가 pending answer 뒤 계속할 차례야"
- skill: tk-browser-verify
  positive:
    - "이 모달이 실제로 저장되는지 브라우저에서 확인해줘"
    - "QA와 로컬 화면 차이를 runtime 증거로 검증해줘"
    - "Figma와 현재 구현이 맞는지 브라우저에서 확인해줘"
    - "tk-implement로 반응형 저장 모달을 구현해줘"
    - "임시 HTML을 브라우저로 열어서 hover와 form 동작이 맞는지 봐줘"
    - "Prototype을 실제로 눌러보며 UI 상태 전이를 확인해줘"
  negative:
    - "서버 내부 로그 문구만 수정해줘"
    - "모달 설계 아이디어를 세 개 만들어줘"
    - "브라우저를 열지 않고 코드만 리뷰해줘"
    - "Chrome에서 React 문서를 읽고 핵심만 요약해줘"
    - "이 URL의 screenshot을 저장만 해줘"
    - "웹페이지 본문 text만 추출해줘"
- skill: tk-drive
  positive:
    - "$tk-drive 이 source를 spec부터 verified commit까지 진행해줘"
    - "$tk-drive 이 Ready spec을 끝까지 처리해줘"
    - "active tk-drive가 A/B를 물었고 사용자가 A라고 답했다"
  negative:
    - "이 함수를 구현해줘"
    - "계속 진행해"
    - ".tigerkit/spec.md가 있으니 자동으로 시작해"
- skill: tk-merge-conflict
  positive:
    - "tk-merge-conflict로 현재 rebase를 완료해줘"
    - "진행 중인 cherry-pick conflict를 의도 기준으로 해결해줘"
    - "merge conflict를 stage하고 operation 종료까지 처리해줘"
  negative:
    - "active conflict 없이 파일을 정리해줘"
    - "rebase를 abort해줘"
    - "force push로 충돌을 없애줘"
