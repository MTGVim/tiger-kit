# Static contract fixtures.
# These files do not execute models or measure invocation accuracy.

- case: small-implement-stays-direct
  skill: tk-implement
  expect: "Small single work is implemented directly without a subagent."
- case: implement-auto-decides-unspecified-strategy
  skill: tk-implement
  expect: "After non-destructive inspection, unspecified execution mode and TDD choices are decided automatically and implementation proceeds without strategy approval."
- case: implement-respects-explicit-strategy
  skill: tk-implement
  expect: "Explicit scope, method, prohibitions, direct/delegated, TDD, verification, and commit decisions are binding and are not re-asked or overridden by defaults."
- case: implement-routes-visible-ui-through-browser-verify
  skill: tk-implement
  expect: "A visible UI or browser behavior scope activates hybrid tk-browser-verify before the first browser tool call and allows browser drivers only inside that contract."
- case: implement-browser-tool-requires-browser-verify
  skill: tk-implement
  expect: "tk-implement never bypasses tk-browser-verify by calling Chrome MCP, Playwright, CDP, or a native browser directly; an early call invalidates its evidence and fails without commit, while an unavailable skill makes browser verification Unverifiable."
- case: implement-runs-design-preflight-before-ui-edit
  skill: tk-implement
  expect: "When Figma, screenshots, or a design specification define the expected UI, tk-browser-verify design intent preflight runs before source mutation and runtime verification runs after implementation."
- case: implement-non-agent-tools-are-not-delegation
  skill: tk-implement
  expect: "Context-mode, MCPs, sandboxes, browsers, and analysis tools remain available in both direct and delegated modes."
- case: implement-delegation-is-single-level
  skill: tk-implement
  expect: "Delegated mode uses at most one implementor without nested delegation."
- case: implement-tdd-follows-user-decision
  skill: tk-implement
  expect: "TDD follows the approved or explicit user decision."
- case: implement-commits-after-verification
  skill: tk-implement
  expect: "A completed and successfully verified implementation is committed to the current branch."
- case: implement-does-not-commit-failing-change
  skill: tk-implement
  expect: "Change-related verification failures prevent commit."
- case: implement-does-not-push
  skill: tk-implement
  expect: "Commit authority does not include push, PR, merge, tag, release, or publish."
- case: implement-does-not-auto-reflect
  skill: tk-implement
  expect: "Completion does not invoke tk-reflect automatically."
- case: browser-owned-session-cleans-up
  skill: tk-browser-verify
  expect: "A newly launched browser session is cleaned up without broad process termination."
- case: browser-attached-session-is-preserved
  skill: tk-browser-verify
  expect: "An attached existing browser and its existing tabs remain open."
- case: browser-first-tool-call-owns-lazy-session
  skill: tk-browser-verify
  expect: "A browser lazily launched by the first tool call is treated as owned."
- case: browser-rejects-unverified-auto-launch
  skill: tk-browser-verify
  expect: "An auto-launch browser tool is not called until headless isolated execution is confirmed; without a safe alternative the result is Unverifiable."
- case: browser-refuses-real-payment
  skill: tk-browser-verify
  expect: "A real payment without safe authorization is Unverifiable and not executed."
- case: browser-guard-mode-is-lightweight
  skill: tk-browser-verify
  expect: "Temporary HTML, prototype, and exploratory UI checks use applicable pitfall guards without a responsive matrix or formal verdict."
- case: browser-guard-visual-claim-needs-screenshot
  skill: tk-browser-verify
  expect: "Guard mode inspects an actual screenshot when making a visual correctness claim but does not require one for non-visual network or DOM exploration."
- case: browser-verdict-mode-preserves-contract
  skill: tk-browser-verify
  expect: "Persistent user-visible source changes, explicit invocation, and formal verdict requests use the full existing runtime evidence and verdict contract."
- case: browser-explicit-invocation-uses-verdict
  skill: tk-browser-verify
  expect: "Explicit invocation selects Verdict mode; automatic trigger exclusions apply only when the skill was not explicitly requested."
- case: browser-auto-open-fallback-closes-owned-tabs
  skill: tk-browser-verify
  expect: "When server auto-open cannot be disabled, verification continues and only tabs opened by the current run are closed."
- case: grill-me-keeps-one-question-at-a-time
  skill: tk-grill-me
  expect: "Only one highest-impact user decision question is asked at a time."
- case: grill-me-researches-facts-before-asking
  skill: tk-grill-me
  expect: "Facts available in code or environment are researched before asking the user."
- case: grill-me-keeps-ambiguity-ledger
  skill: tk-grill-me
  expect: "The conversation tracks Scope, Constraints, Outputs, and Verification separately and does not let one subtopic hide unresolved tracks."
- case: grill-me-separates-facts-from-judgment
  skill: tk-grill-me
  expect: "Exact descriptive code facts may be confirmed from evidence, while inferred facts and all new behavior decisions remain user decisions."
- case: grill-me-preserves-answer-boundaries
  skill: tk-grill-me
  expect: "User reasoning, constraints, outputs, and out-of-scope boundaries are preserved; unspoken content remains an assumption rather than a confirmed decision."
- case: grill-me-reconfirms-meaning-changing-summary
  skill: tk-grill-me
  expect: "The skill asks one targeted confirmation before proceeding when its summary changes scope, constraints, exclusions, or conflicts with an existing decision."
- case: grill-me-closes-with-goal-approval
  skill: tk-grill-me
  expect: "After all four ledger tracks are resolved, the skill restates a one-sentence goal and completes only after explicit user approval."
- case: grill-me-ledger-stays-in-conversation
  skill: tk-grill-me
  expect: "The ambiguity ledger stays in the conversation and receipt without automatically creating .tigerkit files, specs, tickets, or domain documents."
- case: grill-me-does-not-write-domain-docs
  skill: tk-grill-me
  expect: "The skill does not mutate CONTEXT, glossary, or domain documents."
- case: grill-me-does-not-create-adrs
  skill: tk-grill-me
  expect: "The skill does not create ADRs automatically."
- case: implement-tdd-requires-observed-red
  skill: tk-implement
  expect: "TDD requires executing the focused test and observing a real failure before implementation."
- case: implement-tdd-uses-public-behavior
  skill: tk-implement
  expect: "TDD tests meaningful public behavior instead of implementation details."
- case: implement-non-tdd-still-verifies
  skill: tk-implement
  expect: "Non-TDD implementation still runs focused and final verification."
- case: implement-reviews-every-standalone-run
  skill: tk-implement
  expect: "Every standalone implementation runs current-agent Standards and Spec review before commit, including small low-risk changes."
- case: implement-review-pins-fixed-point
  skill: tk-implement
  expect: "Preflight records initial HEAD, branch, pre-existing dirty paths, and candidate/staged inventories before findings."
- case: implement-review-rejects-drift
  skill: tk-implement
  expect: "Review-head or staged drift invalidates stale evidence and prevents commit until affected coverage is rerun."
- case: implement-review-separates-standards-and-spec
  skill: tk-implement
  expect: "Standards and Spec remain separate verdict axes with R/AC evidence when IDs exist."
- case: implement-review-bounds-independent-reviewer
  skill: tk-implement
  expect: "Only large or high-risk work may use one independent reviewer, without editing, fan-out, re-delegation, or automatic re-review."
- case: implement-review-bounds-large-diff-context
  skill: tk-implement
  expect: "Only diffs at or below 15 files and 800 changed lines are small; large or unknown diffs use bounded inspection with full coverage."
- case: implement-diagnoses-unknown-cause-failure
  skill: tk-implement
  expect: "Unknown-cause, intermittent, and performance failures enter the conditional investigation loop before mutation."
- case: implement-diagnosis-requires-red-capable-loop
  skill: tk-implement
  expect: "A repeatable red-capable feedback loop runs before hypotheses or a patch."
- case: implement-diagnosis-does-not-patch-without-reproduction
  skill: tk-implement
  expect: "Failure to reproduce produces Unverifiable evidence, not a speculative patch or commit."
- case: implement-diagnosis-reruns-original-reproduction
  skill: tk-implement
  expect: "The original reproduction reruns after the regression seam is green."
- case: implement-diagnosis-cleans-instrumentation
  skill: tk-implement
  expect: "Temporary instrumentation and throwaway artifacts are removed before clean verification."
- case: implement-diagnosis-reports-missing-seam
  skill: tk-implement
  expect: "A missing public regression seam is reported instead of replaced by a shallow test."
- case: standalone-diagnose-only-is-read-only
  skill: tk-implement
  expect: "An ordinary diagnose-only request gathers evidence without source mutation, commit authority, or a removed-skill trigger."
- case: standalone-review-only-is-read-only
  skill: tk-implement
  expect: "An ordinary fixed-diff review request remains read-only and does not gain implementation commit authority."
- case: implement-review-15-files-800-lines-is-small
  skill: tk-implement
  expect: "A trustworthy inventory with exactly 15 files and 800 additions plus deletions is small; exceeding either boundary is large."
- case: implement-review-size-unknown-is-bounded
  skill: tk-implement
  expect: "Binary, rename, or incomplete inventory is size_unknown and uses bounded inspection without raw full-diff output or an uncovered Pass."
- case: merge-conflict-requires-active-operation
  skill: tk-merge-conflict
  expect: "Conflict handling starts only during an active merge, rebase, cherry-pick, or revert."
- case: merge-conflict-finishes-operation
  skill: tk-merge-conflict
  expect: "Resolved files are staged and the operation continues until no conflict remains."
- case: merge-conflict-does-not-abort
  skill: tk-merge-conflict
  expect: "The skill does not abort the active operation automatically."
- case: merge-conflict-does-not-force-push
  skill: tk-merge-conflict
  expect: "The skill does not force push or push automatically."
- case: reflect-is-report-only
  skill: tk-reflect
  expect: "No files are modified; candidates use the documented target axes."
- case: reflect-classifies-repo-placement
  skill: tk-reflect
  expect: "The closed safety set, verified paths, immediate parent, tracked regular siblings, and threshold deterministically select root rule, nested rule, or repo skill."
- case: to-spec-does-not-create-tickets
  skill: tk-to-spec
  expect: "A spec is produced without ticket decomposition."
- case: to-spec-structures-bug-evidence
  skill: tk-to-spec
  expect: "Bug specs separate symptom, current and expected behavior, reproduction, evidence, environment, and missing regression seam."
- case: to-spec-preserves-source-ui-writing-verbatim
  skill: tk-to-spec
  expect: "Provided labels, button names, guide copy, column names, and other UI writing remain exact literals unless the user explicitly authorizes a change; drift prevents Ready."
- case: to-tickets-does-not-create-spec
  skill: tk-to-tickets
  expect: "Ticket decomposition does not create or modify a spec."
- case: to-tickets-initial-status-is-pending
  skill: tk-to-tickets
  expect: "Standalone ticket creation initializes every ticket as pending."
- case: to-tickets-keeps-one-vertical-bug-slice
  skill: tk-to-tickets
  expect: "One bug fix keeps reproduction, diagnosis, fix, regression, original rerun, and cleanup in one vertical slice."
- case: to-tickets-preserves-source-ui-writing-verbatim
  skill: tk-to-tickets
  expect: "Provided UI writing remains exact in the source inventory, coverage, and owning tickets unless an explicit source decision authorizes a change."
- case: prototype-is-not-production
  skill: tk-prototype
  expect: "The result distinguishes fake and real behavior and is not called production-ready."
- case: prototype-web-uses-disposable-variants
  skill: tk-prototype
  expect: "Web comparison reuses the repo stack or static HTML/CSS/JS fallback without dependencies, compares 2-3 meaningful concepts, and verifies wide/narrow interaction evidence."
- case: prototype-web-toggle-preserves-legibility
  skill: tk-prototype
  expect: "Wide columns and narrow stacks remain simultaneous unless they harm the concept or minimum legibility, in which case an explicit A/B or A/B/C toggle is allowed."
- case: grooming-defaults-report-only
  skill: tk-grooming
  expect: "Findings and proposals are emitted without edits by default."
- case: grooming-classifies-repo-placement
  skill: tk-grooming
  expect: "The same placement rubric maps kind changes to convert, root/nested changes to move, mixed units to split, and correct placement to keep."
- case: legacy-global-state-is-not-scanned
  skill: tk-grooming
  expect: "Legacy global TigerKit state is not automatically discovered or migrated."
- case: handoff-resume-no-drift-continues
  skill: tk-handoff
  expect: "An explicit resume invocation continues without another approval when current state matches the handoff or only non-material drift is observed."
- case: handoff-resume-material-drift-blocks
  skill: tk-handoff
  expect: "Scope, branch intent, confirmed-decision, ownership, or verification-result drift stops for one explicit user decision before continuation."
- case: traceability-preserves-requirement-ids
  skill: tk-to-spec
  expect: "Stable requirement and acceptance IDs are preserved from spec through tickets, implementation receipts, and the implementation Spec review axis when those IDs exist."
- case: implement-review-high-risk-is-conditional
  skill: tk-implement
  expect: "High-risk checks load only for diff signals such as auth, privacy, payment, migration, data loss, concurrency, dependency, or public API changes."
- case: implement-preserves-source-ui-writing-verbatim
  skill: tk-implement
  expect: "Provided UI writing is frozen before mutation and exactly rechecked in the implementation and staged candidate; unauthorized drift prevents commit."
- case: browser-accessibility-is-conditional
  skill: tk-browser-verify
  expect: "Keyboard, focus, accessible-name, and error-association evidence is gathered for relevant form, dialog, navigation, or focus flows without claiming a full WCAG audit."
- case: browser-captures-move-to-tigerkit-ledger
  skill: tk-browser-verify
  expect: "Run-owned screenshots, traces, videos, network dumps, and console captures are moved from tool or user scratch into the repo-local TigerKit run ledger before verdict; user-owned inputs are preserved."
- case: learn-requires-eval-and-compatibility
  skill: tk-learn
  expect: "A skill candidate includes trigger validation, success and boundary assertions, a baseline plan, and a portable-core versus host-extension compatibility decision before approval."
- case: learn-implicit-write-awaits-approval
  skill: tk-learn
  expect: "Implicit invocation stops at draft and checkpoint until current-turn explicit approval authorizes a target write."
- case: handoff-ignores-generic-continue
  skill: tk-handoff
  expect: "Generic continue, summary, and status prompts do not trigger handoff write or resume."
- case: drive-requires-explicit-start
  skill: tk-drive
  expect: "Only explicit $tk-drive starts a workflow; ordinary implementation, generic continue, artifacts, and unrelated answers do not."
- case: drive-resumes-pending-answer
  skill: tk-drive
  expect: "A direct same-conversation answer to the active pending decision resumes the next phase without another invocation."
- case: drive-does-not-auto-reflect
  skill: tk-drive
  expect: "Completion reports only whether a reusable candidate exists and never invokes reflection automatically."
- case: drive-skips-unneeded-tickets
  skill: tk-drive
  expect: "A single short vertical slice moves from Ready spec directly to implementation without a ticket artifact."
- case: drive-keeps-ticket-ledger
  skill: tk-drive
  expect: "Multi-slice or long-resume work tracks pending, in_progress, verified, or blocked with evidence and revalidates on resume."
- case: drive-bounds-nested-skills
  skill: tk-drive
  expect: "Automatic nested skills are limited to prototype, browser verification, and merge conflict handling."
- case: drive-commits-once
  skill: tk-drive
  expect: "The whole verified drive creates one final current-branch commit rather than per-phase commits."
- case: drive-preserves-valid-diff-on-partial-failure
  skill: tk-drive
  expect: "Partial failure leaves valid source changes uncommitted and removes only owned temporary artifacts."
- case: drive-review-parity
  skill: tk-drive
  expect: "Drive uses the same fixed-point, inventory, Standards/Spec, bounded reviewer, finding, and drift gates as standalone implementation."
