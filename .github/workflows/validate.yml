name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Agent Skills
        run: python scripts/validate_skills.py
      - name: Validate Markdown relative links
        run: python scripts/validate_skills.py --links-only
      - name: Run validator regression tests
        run: cd scripts && python -m unittest
      - name: Validate Darwin eval projections
        run: python scripts/sync_eval_compat.py
      - name: Discover skills
        run: npx --yes skills@1.5.9 add . --list
      - name: Smoke install supported targets
        run: |
          smoke_root="$(mktemp -d)"
          cleanup_smoke() {
            find "$smoke_root" -type f -delete
            find "$smoke_root" -depth -type l -delete
            find "$smoke_root" -depth -type d -empty -delete
          }
          trap cleanup_smoke EXIT
          cd "$smoke_root"
          npx --yes skills@1.5.9 add "$GITHUB_WORKSPACE" --agent claude-code --agent codex --agent hermes-agent --copy --yes
          test "$(find "$smoke_root/.claude/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test "$(find "$smoke_root/.agents/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test "$(find "$smoke_root/.hermes/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test -f "$smoke_root/.claude/skills/tk-browser-verify/references/accessibility.md"
          test -f "$smoke_root/.agents/skills/tk-implement/references/review-boundary.md"
          test -f "$smoke_root/.agents/skills/tk-drive/references/phases.md"
          test -f "$smoke_root/.hermes/skills/tk-grill-me/agents/openai.yaml"
          test -f "$smoke_root/.claude/skills/tk-browser-verify/references/safety.md"
          test -f "$smoke_root/.agents/skills/tk-implement/references/delegation.md"
