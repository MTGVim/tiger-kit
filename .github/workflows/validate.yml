name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Agent Skills
        run: python scripts/validate_skills.py
      - name: Validate Markdown relative links
        run: python scripts/validate_skills.py --links-only
      - name: Discover skills
        run: npx --yes skills add . --list
      - name: Smoke install supported targets
        run: |
          export HOME="$(mktemp -d)"
          export CLAUDE_CONFIG_DIR="$HOME/.claude"
          export CODEX_HOME="$HOME/.codex"
          export HERMES_HOME="$HOME/.hermes"
          npx --yes skills add . --global --agent claude-code --agent codex --agent hermes-agent --skill '*' --copy --yes
          test "$(find "$CLAUDE_CONFIG_DIR/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 18
          test "$(find "$HOME/.agents/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 18
          test "$(find "$HERMES_HOME/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 18
          test -f "$CLAUDE_CONFIG_DIR/skills/tk-browser-verify/references/safety.md"
          test -f "$HOME/.agents/skills/tk-implement/references/delegation.md"
          test -f "$HERMES_HOME/skills/tk-grill-me/agents/openai.yaml"
