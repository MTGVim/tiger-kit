name: skills-cli-canary

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

jobs:
  latest-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Discover with latest skills CLI
        run: npx --yes skills add . --list
      - name: Smoke install supported targets with latest CLI
        run: |
          smoke_root="$(mktemp -d)"
          cleanup_smoke() {
            find "$smoke_root" -type f -delete
            find "$smoke_root" -depth -type l -delete
            find "$smoke_root" -depth -type d -empty -delete
          }
          trap cleanup_smoke EXIT
          cd "$smoke_root"
          npx --yes skills add "$GITHUB_WORKSPACE" --agent claude-code --agent codex --agent hermes-agent --copy --yes
          test "$(find "$smoke_root/.claude/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test "$(find "$smoke_root/.agents/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test "$(find "$smoke_root/.hermes/skills" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
          test -f "$smoke_root/.claude/skills/tk-browser-verify/references/safety.md"
          test -f "$smoke_root/.agents/skills/tk-implement/references/delegation.md"
          test -f "$smoke_root/.agents/skills/tk-drive/references/phases.md"
          test -f "$smoke_root/.hermes/skills/tk-grill-me/agents/openai.yaml"
